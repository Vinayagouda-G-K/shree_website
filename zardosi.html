<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: white;
            width: 200px;
            margin: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }
        .card img {
            width: 100%;
            height: 150px;
            cursor: pointer;
        }
        .price {
            color: green;
            font-weight: bold;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }

        /* Animated Footer */
        .footer-note {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 14px;
            color: white;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            padding: 12px 18px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .footer-note:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 70px;
            right: 15px;
            background: #25D366;
            color: white;
            font-size: 24px;
            padding: 12px 15px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
            50% { transform: translateY(-8px); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .card {
                width: 150px;
                margin: 10px;
            }
            .modal img {
                max-width: 90%;
                max-height: 90%;
            }
        }

        @media (max-width: 480px) {
            .container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                justify-items: center;
            }
            .card {
                width: 100%;
                margin: 0;
            }
            .modal img {
                max-width: 95%;
                max-height: 95%;
            }
            .footer-note, .whatsapp-btn {
                font-size: 12px;
                padding: 8px 12px;
                bottom: 60px;
            }
            .whatsapp-btn {
                bottom: 100px;
            }
        }
    </style>
</head>

<body>



<div class="container" id="product-list"></div>

<!-- Modal -->
<div class="modal" id="imageModal" onclick="closeModal()">
    <img id="modalImg" src="">
</div>

<script>
    const products = [
        {name: "Zardosi", price: 3000, image: "images/zardosi1.jpeg"}
    ];

    const container = document.getElementById("product-list");

    products.forEach(product => {
        container.innerHTML += `
            <div class="card">
                <img src="${product.image}" onclick="openModal('${product.image}')">
                <h3>${product.name}</h3>
                <p class="price">₹${product.price}</p>
            </div>
        `;
    });

    function openModal(src) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");
        modal.style.display = "flex";
        modalImg.src = src;
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }
</script>



<!-- Footer Note -->
<div class="footer-note">
    For orders please contact 8123258764
</div>



</body>
</html>
